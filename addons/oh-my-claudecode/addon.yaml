id: oh-my-claudecode
name: oh-my-claudecode
version: 0.1.0
description: Multi-agent orchestration and enhancement layer for Claude Code
source:
  kind: external_git
  url: https://github.com/Yeachan-Heo/oh-my-claudecode
  ref: main
  install_method: external_git
install:
  commands:
    - git clone https://github.com/Yeachan-Heo/oh-my-claudecode.git ~/.local/share/oh-my-claudecode
  verify:
    - test -d ~/.local/share/oh-my-claudecode
policy:
  role: baseline
  action_on_missing: install
agents:
  - claude-code
os:
  - linux
notes:
  - Baseline addon for Claude Code users
  - Agent should install only if current agent is Claude Code-compatible and addon is absent
