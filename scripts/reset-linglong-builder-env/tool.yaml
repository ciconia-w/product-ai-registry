id: reset-linglong-builder-env
name: Reset Linglong Builder Environment
version: 0.1.0
description: Reset stale Linglong builder state, mounts, caches, and temp runtime paths before rebuilding deepin-color-correction as a UAB
entry: run.sh
runtime: bash
os:
  - linux
install_scope: project
target_path: scripts/reset-linglong-builder-env.sh
agents:
  - codex
  - claude-code
  - opencode
description_scope: repo-specific
requires:
  cli:
    - bash
    - pkill
    - mount
    - grep
    - awk
    - sort
    - sudo
permissions:
  workspace_only: false
  network: false
  destructive: true
notes:
  - Intended for the deepin-color-correction repository on Linux hosts
  - Requires care because it unmounts Linglong-related mounts and moves cache directories
  - Adapters must materialize this file into the target repository at scripts/reset-linglong-builder-env.sh before execution
